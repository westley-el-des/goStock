{% extends "base.html" %}
{% block title %}| Criar Conta{% endblock %}

{% block content %}
<div class="gs-auth-wrapper">
  <div class="gs-auth-card">

    <!-- Logo -->
    <div class="text-center mb-4">
      <div class="gs-logo-icon mx-auto mb-3">
        <i class="bi bi-person-plus-fill"></i>
      </div>
      <h1 class="gs-brand-title">Criar <span class="gs-accent">Conta</span></h1>
      <p class="text-muted">Preencha os dados para se registrar</p>
    </div>

    <!-- Formulário -->
    <form method="POST" action="{{ url_for('auth.registro') }}" novalidate>
      <div class="mb-3">
        <label class="gs-label" for="nome">Nome completo</label>
        <div class="input-group">
          <span class="input-group-text gs-input-icon"><i class="bi bi-person-fill"></i></span>
          <input type="text" class="form-control gs-input" id="nome" name="nome"
                 placeholder="Seu nome" required/>
        </div>
      </div>

      <div class="mb-3">
        <label class="gs-label" for="email">E-mail</label>
        <div class="input-group">
          <span class="input-group-text gs-input-icon"><i class="bi bi-envelope-fill"></i></span>
          <input type="email" class="form-control gs-input" id="email" name="email"
                 placeholder="seu@email.com" required/>
        </div>
      </div>

      <div class="mb-3">
        <label class="gs-label" for="senha">Senha <small class="text-muted">(mín. 6 caracteres)</small></label>
        <div class="input-group">
          <span class="input-group-text gs-input-icon"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control gs-input" id="senha" name="senha"
                 placeholder="••••••••" required minlength="6"/>
        </div>
      </div>

      <div class="mb-4">
        <label class="gs-label" for="confirmar_senha">Confirmar senha</label>
        <div class="input-group">
          <span class="input-group-text gs-input-icon"><i class="bi bi-shield-lock-fill"></i></span>
          <input type="password" class="form-control gs-input" id="confirmar_senha" name="confirmar_senha"
                 placeholder="••••••••" required/>
        </div>
      </div>

      <button type="submit" class="btn gs-btn-primary w-100 py-2 mb-3">
        <i class="bi bi-person-check-fill me-2"></i>Criar conta
      </button>

      <p class="text-center text-muted small">
        Já tem conta?
        <a href="{{ url_for('auth.login') }}" class="gs-link">Fazer login</a>
      </p>
    </form>
  </div>
</div>
{% endblock %}
