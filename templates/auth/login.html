{% extends "base.html" %}
{% block title %}| Login{% endblock %}

{% block content %}
<div class="gs-auth-wrapper">
  <div class="gs-auth-card">

    <!-- Logo -->
    <div class="text-center mb-4">
      <div class="gs-logo-icon mx-auto mb-3">
        <i class="bi bi-box-seam-fill"></i>
      </div>
      <h1 class="gs-brand-title">Go<span class="gs-accent">Stock</span></h1>
      <p class="text-muted">Sistema de Controle de Estoque</p>
    </div>

    <!-- Formulário -->
    <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
      <div class="mb-3">
        <label class="gs-label" for="email">E-mail</label>
        <div class="input-group">
          <span class="input-group-text gs-input-icon"><i class="bi bi-envelope-fill"></i></span>
          <input type="email" class="form-control gs-input" id="email" name="email"
                 placeholder="seu@email.com" required autocomplete="email"/>
        </div>
      </div>

      <div class="mb-4">
        <label class="gs-label" for="senha">Senha</label>
        <div class="input-group">
          <span class="input-group-text gs-input-icon"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control gs-input" id="senha" name="senha"
                 placeholder="••••••••" required autocomplete="current-password"/>
          <button class="btn gs-input-icon border-start-0" type="button" id="toggleSenha">
            <i class="bi bi-eye-fill"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn gs-btn-primary w-100 py-2 mb-3">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>

      <p class="text-center text-muted small">
        Não tem conta?
        <a href="{{ url_for('auth.registro') }}" class="gs-link">Criar conta</a>
      </p>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Toggle visibilidade da senha
  document.getElementById("toggleSenha").addEventListener("click", function () {
    const input = document.getElementById("senha");
    const icon = this.querySelector("i");
    if (input.type === "password") {
      input.type = "text";
      icon.className = "bi bi-eye-slash-fill";
    } else {
      input.type = "password";
      icon.className = "bi bi-eye-fill";
    }
  });
</script>
{% endblock %}
